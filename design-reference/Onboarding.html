<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arrive — Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { font-family: 'Inter', system-ui, sans-serif; }
  .font-sans { font-family: 'Inter', system-ui, sans-serif; }
</style>
</head>
<body class="bg-stone-50 text-neutral-900 font-sans antialiased">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

/* ---------- Icons ---------- */
const Icon = ({ d, size = 20, stroke = 1.75, className = "" }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
    fill="none" stroke="currentColor" strokeWidth={stroke}
    strokeLinecap="round" strokeLinejoin="round" className={className} aria-hidden="true">
    {d}
  </svg>
);
const Compass = (p) => <Icon {...p} d={<><path d="m16.24 7.76-1.804 5.411a2 2 0 0 1-1.265 1.265L7.76 16.24l1.804-5.411a2 2 0 0 1 1.265-1.265z"/><circle cx="12" cy="12" r="10"/></>} />;
const Check = (p) => <Icon {...p} d={<path d="M20 6 9 17l-5-5" />} stroke={2.5} />;
const ArrowLeft = (p) => <Icon {...p} d={<><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>} />;
const ArrowRight = (p) => <Icon {...p} d={<><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>} />;
const MapPin = (p) => <Icon {...p} d={<><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></>} />;
const Home = (p) => <Icon {...p} d={<><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></>} />;
const Scale = (p) => <Icon {...p} d={<><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></>} />;
const Briefcase = (p) => <Icon {...p} d={<><path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><rect width="20" height="14" x="2" y="6" rx="2"/></>} />;
const FileText = (p) => <Icon {...p} d={<><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></>} />;
const IdCard = (p) => <Icon {...p} d={<><rect width="20" height="14" x="2" y="5" rx="2"/><path d="M8 10h.01"/><path d="M14 10h6"/><path d="M14 14h6"/><path d="M6 18a3 3 0 0 1 6 0"/></>} />;
const GraduationCap = (p) => <Icon {...p} d={<><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></>} />;
const HelpCircle = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></>} />;
const Globe = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></>} />;

/* ---------- Wordmark + Navbar ---------- */
const Wordmark = () => (
  <a href="#" className="inline-flex items-center gap-2 rounded-lg px-1 py-1 focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-700 focus-visible:ring-offset-2 focus-visible:ring-offset-stone-50" aria-label="Arrive — home">
    <span className="flex h-8 w-8 items-center justify-center rounded-lg bg-teal-700 text-white">
      <Compass size={18} stroke={2} />
    </span>
    <span className="text-lg font-semibold tracking-tight text-neutral-900">Arrive</span>
  </a>
);

const Navbar = () => (
  <header className="border-b border-stone-200 bg-stone-50">
    <nav className="mx-auto flex max-w-3xl items-center justify-between px-6 py-5" aria-label="Primary">
      <Wordmark />
      <button
        type="button"
        className="inline-flex min-h-11 items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-gray-500 hover:text-neutral-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-700 focus-visible:ring-offset-2 focus-visible:ring-offset-stone-50"
        aria-label="Get help"
      >
        <HelpCircle size={18} />
        Need help?
      </button>
    </nav>
  </header>
);

/* ---------- Progress indicator ---------- */
const Progress = ({ step, total }) => {
  const percent = (step / total) * 100;
  return (
    <div className="mx-auto max-w-3xl px-6 pt-10" role="group" aria-label="Progress">
      <div className="flex items-center justify-between">
        <p className="text-sm font-medium text-teal-700" aria-live="polite">
          Step {step} of {total}
        </p>
        <p className="text-sm text-gray-500">About 1 minute</p>
      </div>
      <div className="mt-3 h-1.5 w-full overflow-hidden rounded-full bg-stone-200" aria-hidden="true">
        <div
          className="h-full rounded-full bg-teal-700 transition-all duration-500 ease-out"
          style={{ width: `${percent}%` }}
        ></div>
      </div>
    </div>
  );
};

/* ---------- Selectable card ---------- */
/* Selected = border-2 teal-700 + bg-teal-50 + checkmark badge.
   Three signals so it's unmistakable, per spec. */
const SelectCard = ({ icon, title, description, selected, onClick, multi = false, name }) => {
  const role = multi ? "checkbox" : "radio";
  return (
    <button
      type="button"
      role={role}
      aria-checked={selected}
      aria-label={title}
      onClick={onClick}
      className={[
        "group relative flex w-full min-h-24 items-start gap-4 rounded-2xl border-2 p-5 text-left transition focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-700 focus-visible:ring-offset-2 focus-visible:ring-offset-stone-50 sm:p-6",
        selected
          ? "border-teal-700 bg-teal-50 shadow-sm"
          : "border-stone-200 bg-white hover:border-stone-300 hover:shadow-sm"
      ].join(" ")}
    >
      <span
        className={[
          "flex h-12 w-12 shrink-0 items-center justify-center rounded-xl transition",
          selected ? "bg-teal-700 text-white" : "bg-stone-100 text-teal-700"
        ].join(" ")}
        aria-hidden="true"
      >
        {icon}
      </span>
      <span className="flex-1 pt-1">
        <span className="block text-base font-semibold text-neutral-900 sm:text-lg">{title}</span>
        {description && (
          <span className="mt-1 block text-sm leading-relaxed text-gray-500">
            {description}
          </span>
        )}
      </span>
      <span
        className={[
          "flex h-7 w-7 shrink-0 items-center justify-center rounded-full border-2 transition",
          selected
            ? "border-teal-700 bg-teal-700 text-white"
            : "border-stone-300 bg-white text-transparent"
        ].join(" ")}
        aria-hidden="true"
      >
        <Check size={16} />
      </span>
    </button>
  );
};

/* ---------- Step content ---------- */
const provinces = [
  { id: "on", title: "Ontario", description: "Toronto, Ottawa, Hamilton, and other cities", icon: <MapPin size={22} /> },
  { id: "bc", title: "British Columbia", description: "Vancouver, Surrey, Victoria, and other cities", icon: <MapPin size={22} /> },
  { id: "other", title: "Somewhere else in Canada", description: "We'll match you with national resources too", icon: <Globe size={22} /> }
];

const needs = [
  { id: "housing", title: "Housing", description: "Shelters, rental support, finding a place to live", icon: <Home size={22} /> },
  { id: "legal", title: "Legal aid", description: "Immigration paperwork, refugee claims, free lawyers", icon: <Scale size={22} /> },
  { id: "employment", title: "Employment", description: "Finding work, credential recognition, skills training", icon: <Briefcase size={22} /> }
];

const statuses = [
  { id: "claimant", title: "Refugee claimant", description: "I have made or will make a refugee claim in Canada", icon: <FileText size={22} /> },
  { id: "pr", title: "Permanent resident", description: "I have or am applying for PR status", icon: <IdCard size={22} /> },
  { id: "permit", title: "Study or work permit", description: "I'm in Canada on a temporary permit", icon: <GraduationCap size={22} /> },
  { id: "other", title: "Something else / I'd rather not say", description: "We'll show you general resources", icon: <HelpCircle size={22} /> }
];

/* ---------- Main onboarding flow ---------- */
const Onboarding = () => {
  const [step, setStep] = useState(1);
  const [direction, setDirection] = useState(1); // for transition direction
  const [data, setData] = useState({
    province: null,        // single
    needs: [],             // multi
    status: null           // single
  });
  const [done, setDone] = useState(false);

  const totalSteps = 3;

  const canContinue = (() => {
    if (step === 1) return !!data.province;
    if (step === 2) return data.needs.length > 0;
    if (step === 3) return !!data.status;
    return false;
  })();

  const next = () => {
    if (!canContinue) return;
    if (step < totalSteps) {
      setDirection(1);
      setStep(step + 1);
    } else {
      setDone(true);
    }
  };
  const back = () => {
    if (done) { setDone(false); return; }
    if (step > 1) {
      setDirection(-1);
      setStep(step - 1);
    }
  };

  const reset = () => {
    setData({ province: null, needs: [], status: null });
    setStep(1);
    setDirection(-1);
    setDone(false);
  };

  /* Transition: short fade + slide */
  const [animKey, setAnimKey] = useState(0);
  useEffect(() => { setAnimKey(k => k + 1); }, [step, done]);

  if (done) {
    return (
      <div className="min-h-screen bg-stone-50">
        <Navbar />
        <main className="mx-auto max-w-3xl px-6 py-16">
          <div className="rounded-2xl border border-stone-200 bg-white p-8 shadow-sm sm:p-12">
            <span className="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-teal-700 text-white">
              <Check size={24} stroke={2.5}/>
            </span>
            <h1 className="mt-6 text-3xl font-semibold tracking-tight text-neutral-900 sm:text-4xl">
              Thanks — let's find your matches.
            </h1>
            <p className="mt-4 text-base leading-relaxed text-gray-500 sm:text-lg">
              Based on what you told us, Arrive will look for verified services in
              {" "}<span className="font-medium text-neutral-900">
                {provinces.find(p => p.id === data.province)?.title}
              </span>{" "}
              that help with{" "}
              <span className="font-medium text-neutral-900">
                {data.needs.map(n => needs.find(x => x.id === n)?.title.toLowerCase()).join(", ")}
              </span>.
            </p>
            <div className="mt-8 flex flex-wrap gap-3">
              <a
                href="#chat"
                className="inline-flex min-h-11 items-center justify-center gap-2 rounded-lg bg-teal-700 px-6 py-3 text-base font-medium text-white shadow-sm transition hover:bg-teal-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-700 focus-visible:ring-offset-2 focus-visible:ring-offset-stone-50"
              >
                Continue to chat
                <ArrowRight size={18} />
              </a>
              <button
                type="button"
                onClick={reset}
                className="inline-flex min-h-11 items-center justify-center gap-2 rounded-lg border border-stone-200 bg-white px-6 py-3 text-base font-medium text-neutral-900 transition hover:border-stone-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-700 focus-visible:ring-offset-2 focus-visible:ring-offset-stone-50"
              >
                Start over
              </button>
            </div>
          </div>
        </main>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-stone-50">
      <Navbar />
      <Progress step={step} total={totalSteps} />

      <main className="mx-auto max-w-3xl px-6 py-10 sm:py-12">
        <div
          key={animKey}
          className="animate-[fadein_400ms_ease-out]"
          style={{
            animation: `fadeSlide 380ms cubic-bezier(0.22, 1, 0.36, 1)`,
          }}
        >
          {step === 1 && (
            <section aria-labelledby="step1-heading">
              <h1 id="step1-heading" className="text-3xl font-semibold tracking-tight text-neutral-900 sm:text-4xl">
                Where are you in Canada?
              </h1>
              <p className="mt-3 text-base leading-relaxed text-gray-500 sm:text-lg">
                We'll prioritize services available in your province.
              </p>
              <div className="mt-8 flex flex-col gap-3" role="radiogroup" aria-label="Province">
                {provinces.map(p => (
                  <SelectCard
                    key={p.id}
                    {...p}
                    selected={data.province === p.id}
                    onClick={() => setData(d => ({ ...d, province: p.id }))}
                  />
                ))}
              </div>
            </section>
          )}

          {step === 2 && (
            <section aria-labelledby="step2-heading">
              <h1 id="step2-heading" className="text-3xl font-semibold tracking-tight text-neutral-900 sm:text-4xl">
                What do you need help with?
              </h1>
              <p className="mt-3 text-base leading-relaxed text-gray-500 sm:text-lg">
                Pick everything that applies — you can choose more than one.
              </p>
              <div className="mt-8 flex flex-col gap-3" role="group" aria-label="Areas of help">
                {needs.map(n => {
                  const selected = data.needs.includes(n.id);
                  return (
                    <SelectCard
                      key={n.id}
                      {...n}
                      multi
                      selected={selected}
                      onClick={() =>
                        setData(d => ({
                          ...d,
                          needs: selected
                            ? d.needs.filter(x => x !== n.id)
                            : [...d.needs, n.id]
                        }))
                      }
                    />
                  );
                })}
              </div>
              <p className="mt-4 text-sm text-gray-500" aria-live="polite">
                {data.needs.length === 0
                  ? "None selected yet."
                  : `${data.needs.length} selected.`}
              </p>
            </section>
          )}

          {step === 3 && (
            <section aria-labelledby="step3-heading">
              <h1 id="step3-heading" className="text-3xl font-semibold tracking-tight text-neutral-900 sm:text-4xl">
                What is your immigration status?
              </h1>
              <p className="mt-3 text-base leading-relaxed text-gray-500 sm:text-lg">
                This helps us point you to the right kind of legal and settlement support.
              </p>
              <div className="mt-4 inline-flex items-start gap-2 rounded-lg bg-amber-50 px-3 py-2 text-sm text-amber-700">
                <span aria-hidden="true">·</span>
                Your answer is private and never shared with any government agency.
              </div>
              <div className="mt-6 flex flex-col gap-3" role="radiogroup" aria-label="Immigration status">
                {statuses.map(s => (
                  <SelectCard
                    key={s.id}
                    {...s}
                    selected={data.status === s.id}
                    onClick={() => setData(d => ({ ...d, status: s.id }))}
                  />
                ))}
              </div>
            </section>
          )}
        </div>

        {/* Nav row */}
        <div className="mt-10 flex items-center justify-between">
          <button
            type="button"
            onClick={back}
            disabled={step === 1}
            className="inline-flex min-h-11 items-center gap-2 rounded-lg px-4 py-2 text-base font-medium text-neutral-900 transition hover:bg-stone-200 disabled:cursor-not-allowed disabled:opacity-40 disabled:hover:bg-transparent focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-700 focus-visible:ring-offset-2 focus-visible:ring-offset-stone-50"
          >
            <ArrowLeft size={18} />
            Back
          </button>
          <button
            type="button"
            onClick={next}
            disabled={!canContinue}
            className="inline-flex min-h-11 items-center gap-2 rounded-lg bg-teal-700 px-6 py-3 text-base font-medium text-white shadow-sm transition hover:bg-teal-800 disabled:cursor-not-allowed disabled:bg-stone-300 disabled:text-gray-500 disabled:shadow-none focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-700 focus-visible:ring-offset-2 focus-visible:ring-offset-stone-50"
          >
            {step === totalSteps ? "See my matches" : "Continue"}
            <ArrowRight size={18} />
          </button>
        </div>

        {/* Privacy footer reinforcement */}
        <p className="mt-12 text-center text-xs text-gray-500">
          Arrive does not log your conversations or share information with IRCC, CBSA, or any government agency.
        </p>
      </main>

      <style>{`
        @keyframes fadeSlide {
          from { opacity: 0; transform: translateY(8px); }
          to   { opacity: 1; transform: translateY(0); }
        }
      `}</style>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<Onboarding />);
</script>
</body>
</html>
