<style>
  html, body { font-family: 'Inter', system-ui, sans-serif; height: 100%; }
  body { margin: 0; }
  #root { height: 100%; }
  .font-sans { font-family: 'Inter', system-ui, sans-serif; }

  @keyframes dot { 0%, 60%, 100% { opacity: 0.25; transform: translateY(0);} 30% { opacity: 1; transform: translateY(-2px);} }
  .dot { animation: dot 1.2s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} }
  .fade-up { animation: fadeUp 320ms cubic-bezier(0.22, 1, 0.36, 1); }

  /* Hide caret blinker on streaming text */
  @keyframes caret { 50% { opacity: 0; } }
  .caret { display: inline-block; width: 2px; height: 1em; background: currentColor; margin-left: 2px; vertical-align: -2px; animation: caret 1s steps(2) infinite; }
</style>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* =========================================================
   Icons
   ========================================================= */
const Icon = ({ d, size = 20, stroke = 1.75, className = "" }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
    fill="none" stroke="currentColor" strokeWidth={stroke}
    strokeLinecap="round" strokeLinejoin="round" className={className} aria-hidden="true">{d}</svg>
);
const Compass = (p) => <Icon {...p} d={<><path d="m16.24 7.76-1.804 5.411a2 2 0 0 1-1.265 1.265L7.76 16.24l1.804-5.411a2 2 0 0 1 1.265-1.265z"/><circle cx="12" cy="12" r="10"/></>} />;
const Send = (p) => <Icon {...p} d={<><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></>} />;
const Phone = (p) => <Icon {...p} d={<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>} />;
const ExternalLink = (p) => <Icon {...p} d={<><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></>} />;
const ShieldCheck = (p) => <Icon {...p} d={<><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></>} />;
const Check = (p) => <Icon {...p} d={<path d="M20 6 9 17l-5-5"/>} stroke={2.5}/>;
const ChevronDown = (p) => <Icon {...p} d={<path d="m6 9 6 6 6-6"/>} />;
const AlertTriangle = (p) => <Icon {...p} d={<><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></>} />;
const RefreshCw = (p) => <Icon {...p} d={<><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></>} />;

/* =========================================================
   Wordmark + Navbar
   ========================================================= */
const Wordmark = () => (
  <a href="#" className="inline-flex items-center gap-2 rounded-lg px-1 py-1 focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-700 focus-visible:ring-offset-2 focus-visible:ring-offset-stone-50" aria-label="Arrive — home">
    <span className="flex h-8 w-8 items-center justify-center rounded-lg bg-teal-700 text-white">
      <Compass size={18} stroke={2}/>
    </span>
    <span className="text-lg font-semibold tracking-tight text-neutral-900">Arrive</span>
  </a>
);

const StateMenu = ({ value, onChange }) => {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", close);
    return () => document.removeEventListener("mousedown", close);
  }, []);
  const labels = {
    live: "Live (try it)",
    empty: "Empty state",
    loading: "Loading state",
    streaming: "Streaming state",
    error: "Error state",
    long: "Long response"
  };
  return (
    <div className="relative" ref={ref}>
      <button
        type="button"
        onClick={() => setOpen(o => !o)}
        className="inline-flex min-h-11 items-center gap-2 rounded-lg border border-stone-200 bg-white px-3 py-2 text-sm font-medium text-neutral-900 shadow-sm hover:border-stone-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-700 focus-visible:ring-offset-2 focus-visible:ring-offset-stone-50"
        aria-haspopup="listbox"
        aria-expanded={open}
        aria-label="Choose demo state"
      >
        <span className="hidden text-gray-500 sm:inline">Demo:</span>
        {labels[value]}
        <ChevronDown size={16} className="text-gray-500" />
      </button>
      {open && (
        <ul
          role="listbox"
          className="absolute right-0 z-20 mt-2 w-56 overflow-hidden rounded-2xl border border-stone-200 bg-white py-2 shadow-lg"
        >
          {Object.entries(labels).map(([k, l]) => (
            <li key={k} role="option" aria-selected={value === k}>
              <button
                type="button"
                onClick={() => { onChange(k); setOpen(false); }}
                className={[
                  "flex w-full items-center justify-between px-4 py-2 text-left text-sm focus:outline-none focus-visible:bg-stone-100",
                  value === k ? "text-teal-700 font-medium bg-teal-50" : "text-neutral-900 hover:bg-stone-100"
                ].join(" ")}
              >
                {l}
                {value === k && <Check size={16}/>}
              </button>
            </li>
          ))}
        </ul>
      )}
    </div>
  );
};

const Navbar = ({ mode, setMode }) => (

        >
          <Phone size={16} className="text-gray-500"/>

        </a>
      ) : <span/>}

/* =========================================================

const UserBubble = ({ text }) => (

);

const Disclaimer = () => (

    This is not legal advice. For legal matters, consult a lawyer or legal aid clinic.

);

const AIBubble = ({ blocks, streaming = false, error = false, onRetry }) => (
  <div className="flex flex-col items-start fade-up">
    <div className="w-full max-w-[92%] rounded-2xl border border-stone-200 bg-white p-4 shadow-sm sm:max-w-[85%] sm:p-5">
      {error && (
        <div className="mb-4 flex items-start gap-3 rounded-lg border border-amber-200 bg-amber-50 p-3 text-sm text-amber-900">
          <AlertTriangle size={18} className="shrink-0 text-amber-700"/>
          <div className="flex-1">
            <p className="font-medium">We couldn't reach the assistant just now.</p>
            <p className="mt-1 text-amber-800">Showing trusted resources from your last topic. You can retry below.</p>
          </div>
        </div>
      )}
      <div className="space-y-4">
        {blocks.map((b, i) => {
          if (b.type === "text") {
            return (
              <p key={i} className="text-base leading-relaxed text-neutral-900">
                {b.content}
                {streaming && i === blocks.length - 1 && <span className="caret"/>}
              </p>
            );
          }
          if (b.type === "resource") {
            return <ResourceCard key={i} {...b.data} />;
          }
          return null;
        })}
      </div>
      {error && (
        <button
          type="button"
          onClick={onRetry}
          className="mt-4 inline-flex min-h-11 items-center gap-2 rounded-lg border border-stone-200 bg-white px-4 py-2 text-sm font-medium text-neutral-900 hover:border-stone-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-700 focus-visible:ring-offset-2 focus-visible:ring-offset-white"
        >
          <RefreshCw size={14}/>
          Try again
        </button>
      )}
    </div>
    <Disclaimer />
  </div>
);

const LoadingBubble = () => (

        <span className="dot h-2 w-2 rounded-full bg-gray-500"></span>
        <span className="dot h-2 w-2 rounded-full bg-gray-500"></span>
      </div>

);

      <h2 className="mt-6 text-2xl font-semibold tracking-tight text-neutral-900 sm:text-3xl">
        Hi — tell me what you need help with and I'll find verified resources for your situation.

      </p>
      <div className="mt-8 flex flex-wrap justify-center gap-2">
        {suggestions.map(s => (
          <button
            key={s}
            type="button"

            className="inline-flex min-h-11 items-center rounded-lg border border-stone-200 bg-white px-4 py-2 text-sm font-medium text-neutral-900 shadow-sm transition hover:border-stone-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-700 focus-visible:ring-offset-2 focus-visible:ring-offset-stone-50"
          >

};

/* =========================================================
   Input bar
   ========================================================= */
const InputBar = ({ value, onChange, onSubmit, disabled }) => {
  const handleKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      onSubmit();
    }
  };
  return (
    <div className="border-t border-stone-200 bg-stone-50">
      <form
        className="mx-auto flex max-w-3xl items-end gap-2 px-4 py-3 sm:gap-3 sm:px-6 sm:py-4"
        onSubmit={(e) => { e.preventDefault(); onSubmit(); }}
      >
        <label htmlFor="chat-input" className="sr-only">Message Arrive</label>
        <textarea
          id="chat-input"
          rows={1}
          value={value}
          onChange={(e) => onChange(e.target.value)}
          onKeyDown={handleKey}
          placeholder="Tell me what you need help with…"
          disabled={disabled}
          className="flex-1 resize-none rounded-2xl border border-stone-200 bg-white px-4 py-3 text-base leading-relaxed text-neutral-900 placeholder:text-gray-500 shadow-sm focus:border-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-700 focus:ring-offset-2 focus:ring-offset-stone-50 disabled:bg-stone-100"
          style={{ minHeight: "48px", maxHeight: "120px" }}
        />
        <button
          type="submit"
          disabled={disabled || !value.trim()}
          className="inline-flex min-h-11 min-w-11 items-center justify-center gap-2 rounded-lg bg-teal-700 px-4 py-3 text-base font-medium text-white shadow-sm transition hover:bg-teal-800 disabled:cursor-not-allowed disabled:bg-stone-300 disabled:text-gray-500 disabled:shadow-none focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-700 focus-visible:ring-offset-2 focus-visible:ring-offset-stone-50"
          aria-label="Send message"
        >
          <Send size={18}/>
          <span className="hidden sm:inline">Send</span>
        </button>
      </form>
    </div>
  );
};

/* =========================================================
   Streaming hook — types out a string char by char
   ========================================================= */
const useStreamedText = (target, active, speed = 14) => {
  const [out, setOut] = useState("");
  useEffect(() => {
    if (!active) { setOut(target); return; }
    setOut("");
    let i = 0;
    const id = setInterval(() => {
      i += 1;
      setOut(target.slice(0, i));
      if (i >= target.length) clearInterval(id);
    }, speed);
    return () => clearInterval(id);
  }, [target, active, speed]);
  return out;
};

/* =========================================================
   Main app
   ========================================================= */
const ChatApp = () => {
  const [mode, setMode] = useState("live");
  const [input, setInput] = useState("");
  const scrollRef = useRef(null);

  // For 'live' mode
  const [liveMessages, setLiveMessages] = useState([]); // {id, role, blocks?, text?}
  const [liveStatus, setLiveStatus] = useState("idle"); // 'idle' | 'loading' | 'streaming'
  const [streamProgress, setStreamProgress] = useState(0); // chars revealed of streaming text

  // Scroll to bottom on changes
  useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [liveMessages, liveStatus, streamProgress, mode]);

  /* ----- Live conversational simulation ----- */
  const sendLive = (text) => {
    const msg = text.trim();
    if (!msg || liveStatus !== "idle") return;
    setInput("");
    const userMsg = { id: Date.now(), role: "user", text: msg };
    setLiveMessages(m => [...m, userMsg]);
    setLiveStatus("loading");

    // After a moment, start "streaming"
    setTimeout(() => {
      setLiveStatus("streaming");
      const aiMsg = { id: Date.now() + 1, role: "ai", blocks: SAMPLE_AI_BLOCKS_SHORT, _streamingText: SAMPLE_AI_BLOCKS_SHORT[0].content };
      setLiveMessages(m => [...m, aiMsg]);
      setStreamProgress(0);
    }, 900);
  };

  // drive the streaming character reveal in live mode
  useEffect(() => {
    if (liveStatus !== "streaming") return;
    const last = liveMessages[liveMessages.length - 1];
    if (!last || last.role !== "ai") return;
    const target = last._streamingText || "";
    if (streamProgress >= target.length) {
      // streaming finished. small pause, then mark done
      const t = setTimeout(() => setLiveStatus("idle"), 300);
      return () => clearTimeout(t);
    }
    const id = setTimeout(() => setStreamProgress(p => p + 1), 14);
    return () => clearTimeout(id);
  }, [liveStatus, streamProgress, liveMessages]);

  // Build the live AI blocks while streaming: replace first text block with progress
  const liveRender = useMemo(() => {
    if (liveStatus !== "streaming") return liveMessages;
    return liveMessages.map((m, i) => {
      if (i !== liveMessages.length - 1 || m.role !== "ai") return m;
      const fullFirst = m._streamingText || "";
      const partial = fullFirst.slice(0, streamProgress);
      const isComplete = streamProgress >= fullFirst.length;
      const blocks = isComplete
        ? m.blocks
        : [{ type: "text", content: partial }];
      return { ...m, blocks };
    });
  }, [liveMessages, liveStatus, streamProgress]);

  /* ----- Render switching by mode ----- */
  const renderBody = () => {
    if (mode === "empty") {
      return <EmptyState onSuggestion={(s) => { setMode("live"); setInput(s); }} />;
    }
    if (mode === "loading") {
      return (
        <div className="space-y-6">
          <UserBubble text="I just landed in Vancouver and I need legal aid for my asylum claim."/>
          <LoadingBubble />
        </div>
      );
    }
    if (mode === "streaming") {
      return <StreamingDemo />;
    }
    if (mode === "error") {
      return (
        <div className="space-y-6">
          <UserBubble text={SAMPLE_USER}/>
          <AIBubble error blocks={[
            { type: "resource", data: RES.costi },
            { type: "resource", data: RES.fcj }
          ]} onRetry={() => setMode("live")} />
        </div>
      );
    }
    if (mode === "long") {
      return (
        <div className="space-y-6">
          <UserBubble text={SAMPLE_USER}/>
          <AIBubble blocks={SAMPLE_AI_BLOCKS_LONG}/>
        </div>
      );
    }
    // live
    if (liveMessages.length === 0) {
      return <EmptyState onSuggestion={(s) => { setInput(s); setTimeout(() => sendLive(s), 0); }} />;
    }
    return (
      <div className="space-y-6">
        {liveRender.map(m => (
          m.role === "user"
            ? <UserBubble key={m.id} text={m.text} />
            : <AIBubble key={m.id} blocks={m.blocks} streaming={liveStatus === "streaming" && m === liveRender[liveRender.length - 1]} />
        ))}
        {liveStatus === "loading" && <LoadingBubble />}
      </div>
    );
  };

  const inputDisabled = mode !== "live" || liveStatus !== "idle";

  return (
    <div className="flex h-full flex-col bg-stone-50">
      <Navbar mode={mode} setMode={setMode}/>

      {/* Mode banner (only when not 'live') */}
      {mode !== "live" && (
        <div className="border-b border-amber-200 bg-amber-50">
          <div className="mx-auto max-w-3xl px-4 py-2 text-xs text-amber-900 sm:px-6">
            Showing the <span className="font-semibold">{mode}</span> state. Switch to "Live" to interact.
          </div>
        </div>
      )}

      <main
        ref={scrollRef}
        className="flex-1 overflow-y-auto"
        aria-label="Conversation"
      >
        <div className={[
          "mx-auto max-w-3xl px-4 sm:px-6",
          (mode === "empty" || (mode === "live" && liveMessages.length === 0)) ? "h-full" : "py-6 sm:py-8"
        ].join(" ")}>
          {renderBody()}
        </div>
      </main>

      <InputBar
        value={input}
        onChange={setInput}
        onSubmit={() => sendLive(input)}
        disabled={inputDisabled}
      />
    </div>
  );
};

/* Streaming-state demo: typed-out partial AI message */
const StreamingDemo = () => {
  const target = SAMPLE_AI_BLOCKS_SHORT[0].content;
  const partial = useStreamedText(target, true, 18);
  const isDone = partial.length >= target.length;
  return (
    <div className="space-y-6">
      <UserBubble text={SAMPLE_USER}/>
      <div className="flex flex-col items-start fade-up">
        <div className="w-full max-w-[92%] rounded-2xl border border-stone-200 bg-white p-4 shadow-sm sm:max-w-[85%] sm:p-5">
          <p className="text-base leading-relaxed text-neutral-900">
            {partial}
            {!isDone && <span className="caret"/>}
          </p>
        </div>
        <p className="mt-2 ml-1 text-xs text-gray-500 sm:ml-2">
          This is not legal advice. For legal matters, consult a lawyer or legal aid clinic.
        </p>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<ChatApp />);
</script>
